name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  shell:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Syntax check
        run: bash -n fan install.sh uninstall.sh tests/smoke.sh tests/install.sh
      - name: Smoke test
        run: bash tests/smoke.sh
      - name: Install test
        run: bash tests/install.sh
